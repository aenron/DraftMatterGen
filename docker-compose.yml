services:
  draft-reason-service:
    build:
      context: .
      cache_from:
        - type=local,src=.docker-cache
      cache_to:
        - type=local,dest=.docker-cache,mode=max
    image: draft-reason-service:latest
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    networks:
      - mcp-proxy_mcp_out_net
    ports:
      - "8002:8000"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    
networks:
  mcp-proxy_mcp_out_net:
    external: true