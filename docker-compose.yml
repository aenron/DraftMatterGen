services:
  draft-reason-service:
    build: .
    image: draft-reason-service:latest
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "8002:8000"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
